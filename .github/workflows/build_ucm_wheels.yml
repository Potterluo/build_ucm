name: Build UCM Wheels

on:
  # Issue 触发 - 当 Issue 被创建或带有特定标签时
  issues:
    types: [opened, edited]

  # 手动触发 - 用于测试或重新构建
  workflow_dispatch:
    inputs:
      ucm_ref:
        description: 'UCM branch, tag or commit SHA'
        required: true
        default: 'main'
        type: string
      python_version:
        description: 'Python version (e.g., 3.11, 3.12)'
        required: true
        default: '3.11'
        type: choice
        options:
          - '3.11'
          - '3.12'
          - '3.13'
      upload_to_release:
        description: 'Upload wheels to GitHub Release'
        required: true
        default: true
        type: boolean

env:
  UCM_REPO: https://github.com/ModelEngine-Group/unified-cache-management.git

permissions:
  contents: write      # 创建 releases 和 tags
  issues: write        # 评论 issue
  actions: read        # 读取 actions

jobs:
  # 解析配置参数
  parse-config:
    runs-on: ubuntu-latest
    # Issue 触发时，检查是否包含构建请求
    if: github.event_name == 'workflow_dispatch' || contains(github.event.issue.body, 'build_config:')
    outputs:
      ucm_ref: ${{ steps.parse.outputs.ucm_ref }}
      python_version: ${{ steps.parse.outputs.python_version }}
      upload_to_release: ${{ steps.parse.outputs.upload_to_release }}
      issue_number: ${{ steps.parse.outputs.issue_number }}

    steps:
      - name: Parse configuration
        id: parse
        run: |
          # workflow_dispatch 直接使用输入参数
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "ucm_ref=${{ inputs.ucm_ref }}" >> $GITHUB_OUTPUT
            echo "python_version=${{ inputs.python_version }}" >> $GITHUB_OUTPUT
            echo "upload_to_release=${{ inputs.upload_to_release }}" >> $GITHUB_OUTPUT
            echo "issue_number=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Issue 触发 - 从 Issue body 解析配置
          ISSUE_BODY="${{ github.event.issue.body }}"
          ISSUE_NUMBER="${{ github.event.issue.number }}"

          echo "Parsing Issue #${ISSUE_NUMBER}..."
          echo "Issue body:"
          echo "$ISSUE_BODY"

          # 默认值
          UCM_REF="main"
          PYTHON_VERSION="3.11"
          UPLOAD_RELEASE="true"

          # 解析 YAML 配置块
          # 格式示例：
          # build_config:
          #   ucm_ref: develop
          #   python_version: 3.12
          #   upload_to_release: true

          # 提取配置值
          UCM_REF=$(echo "$ISSUE_BODY" | grep -E "^  ucm_ref:" | sed 's/^  ucm_ref: *//' | tr -d '[:space:]' || echo "main")
          PYTHON_VERSION=$(echo "$ISSUE_BODY" | grep -E "^  python_version:" | sed 's/^  python_version: *//' | tr -d '[:space:]' || echo "3.11")
          UPLOAD_RELEASE=$(echo "$ISSUE_BODY" | grep -E "^  upload_to_release:" | sed 's/^  upload_to_release: *//' | tr -d '[:space:]' || echo "true")

          echo ""
          echo "Parsed configuration:"
          echo "  UCM Ref: $UCM_REF"
          echo "  Python Version: $PYTHON_VERSION"
          echo "  Upload to Release: $UPLOAD_RELEASE"
          echo "  Issue Number: $ISSUE_NUMBER"

          echo "ucm_ref=$UCM_REF" >> $GITHUB_OUTPUT
          echo "python_version=$PYTHON_VERSION" >> $GITHUB_OUTPUT
          echo "upload_to_release=$UPLOAD_RELEASE" >> $GITHUB_OUTPUT
          echo "issue_number=$ISSUE_NUMBER" >> $GITHUB_OUTPUT

  # 构建 wheel 包 - 多架构矩阵
  build-wheels:
    needs: parse-config
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            arch: aarch64
            platform: linux/arm64

    steps:
      - name: Checkout build_ucm repo
        uses: actions/checkout@v4

      - name: Setup Python ${{ needs.parse-config.outputs.python_version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ needs.parse-config.outputs.python_version }}

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build wheel setuptools cmake ninja

      - name: Clone UCM repository
        run: |
          git clone --depth 1 --branch ${{ needs.parse-config.outputs.ucm_ref }} $UCM_REPO ucm
          cd ucm
          echo "UCM commit: $(git rev-parse HEAD)"
          echo "UCM branch/tag: $(git describe --tags --always)"

      - name: Build wheel
        run: |
          cd ucm
          export PLATFORM="simu"
          rm -rf build dist *.egg-info
          python -m build --wheel --no-isolation

      - name: List built wheels
        run: |
          cd ucm
          ls -la dist/
          for f in dist/*.whl; do
            echo "  $(basename $f)"
          done

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.arch }}-py${{ needs.parse-config.outputs.python_version }}
          path: ucm/dist/*.whl
          retention-days: 30

  # 验证 wheel 安装
  verify-wheels:
    needs: [parse-config, build-wheels]
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: aarch64

    steps:
      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: wheel-${{ matrix.arch }}-py${{ needs.parse-config.outputs.python_version }}
          path: wheels

      - name: Setup Python ${{ needs.parse-config.outputs.python_version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ needs.parse-config.outputs.python_version }}

      - name: Install and verify wheel
        run: |
          pip install wheels/*.whl
          python -c "import ucm; print('✅ UCM imported successfully')"
          python -c "import ucm, os; print(f'Location: {ucm.__file__}')"

      - name: Platform info
        run: |
          echo "Platform: $(uname -m)"
          echo "Python: $(python --version)"

  # 创建 Release 并上传 wheel
  create-release:
    needs: [parse-config, build-wheels, verify-wheels]
    runs-on: ubuntu-latest
    if: needs.parse-config.outputs.upload_to_release == 'true'

    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
      release_url: ${{ steps.tag.outputs.release_url }}

    steps:
      - name: Checkout build_ucm repo
        uses: actions/checkout@v4

      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*-py${{ needs.parse-config.outputs.python_version }}
          path: wheels
          merge-multiple: true

      - name: List all wheels
        run: ls -la wheels/

      - name: Generate release tag
        id: tag
        run: |
          UCM_REF="${{ needs.parse-config.outputs.ucm_ref }}"
          PY_VER="${{ needs.parse-config.outputs.python_version }}"
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          CLEAN_REF=$(echo "$UCM_REF" | sed 's/[^a-zA-Z0-9._-]/-/g')
          RELEASE_TAG="ucm-${CLEAN_REF}-py${PY_VER}-${TIMESTAMP}"
          echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT
          echo "release_url=https://github.com/${{ github.repository }}/releases/tag/${RELEASE_TAG}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: UCM Wheels - ${{ needs.parse-config.outputs.ucm_ref }} (Python ${{ needs.parse-config.outputs.python_version }})
          body: |
            ## UCM Wheel Build

            **UCM Repository:** https://github.com/ModelEngine-Group/unified-cache-management

            **UCM Ref:** ${{ needs.parse-config.outputs.ucm_ref }}

            **Python Version:** ${{ needs.parse-config.outputs.python_version }}

            **Triggered by:** ${{ github.event_name }}

            ### Installation

            ```bash
            pip install uc_manager-*-cp${{ needs.parse-config.outputs.python_version }}*.whl
            ```

            All wheels have been verified to install correctly.
          files: wheels/*.whl
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 评论 Issue 报告构建结果
  report-result:
    needs: [parse-config, build-wheels, verify-wheels, create-release]
    runs-on: ubuntu-latest
    if: needs.parse-config.outputs.issue_number != '0'

    steps:
      - name: Comment on Issue
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = parseInt('${{ needs.parse-config.outputs.issue_number }}');
            const ucmRef = '${{ needs.parse-config.outputs.ucm_ref }}';
            const pyVersion = '${{ needs.parse-config.outputs.python_version }}';
            const releaseTag = '${{ needs.create-release.outputs.release_tag }}';
            const releaseUrl = '${{ needs.create-release.outputs.release_url }}';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            let body = `## ✅ UCM Wheel Build Completed\n\n`;
            body += `| Parameter | Value |\n`;
            body += `|-----------|-------|\n`;
            body += `| UCM Ref | ${ucmRef} |\n`;
            body += `| Python Version | ${pyVersion} |\n`;
            body += `| x86_64 | ✅ Built & Verified |\n`;
            body += `| ARM64 | ✅ Built & Verified |\n\n`;

            if (releaseTag) {
              body += `### 📦 Download Wheels\n\n`;
              body += `**Release:** [${releaseTag}](${releaseUrl})\n\n`;
              body += `| Platform | Wheel |\n`;
              body += `|----------|-------|\n`;
              body += `| x86_64 | \`uc_manager-*-linux_x86_64.whl\` |\n`;
              body += `| ARM64 | \`uc_manager-*-linux_aarch64.whl\` |\n`;
            }

            body += `\n### 🔗 Links\n\n`;
            body += `- [Workflow Run](${runUrl})\n`;
            body += `- [UCM Repository](https://github.com/ModelEngine-Group/unified-cache-management)\n`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: body
            });

      - name: Close Issue
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = parseInt('${{ needs.parse-config.outputs.issue_number }}');
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              state: 'closed'
            });