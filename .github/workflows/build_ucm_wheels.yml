name: Build UCM Wheels

on:
  # Issue 触发 - 当 Issue 被创建或编辑时
  issues:
    types: [opened, edited]

  # 手动触发 - 用于测试或重新构建
  workflow_dispatch:
    inputs:
      ucm_ref:
        description: 'UCM branch, tag or commit SHA'
        required: true
        default: 'main'
        type: string
      python_version:
        description: 'Python version (e.g., 3.11, 3.12)'
        required: true
        default: '3.11'
        type: choice
        options:
          - '3.11'
          - '3.12'
          - '3.13'
      platform:
        description: 'Target platform (simu, cuda, ascend)'
        required: true
        default: 'simu'
        type: choice
        options:
          - 'simu'
          - 'cuda'
          - 'ascend'
      upload_to_release:
        description: 'Upload wheels to GitHub Release'
        required: true
        default: true
        type: boolean

env:
  UCM_REPO: https://github.com/ModelEngine-Group/unified-cache-management.git

permissions:
  contents: write      # 创建 releases 和 tags
  issues: write        # 评论 issue
  actions: read        # 读取 actions

jobs:
  # 解析配置参数
  parse-config:
    runs-on: ubuntu-latest
    # Issue 触发时，检查是否包含构建请求
    if: github.event_name == 'workflow_dispatch' || contains(github.event.issue.body, 'build_config:')
    outputs:
      ucm_ref: ${{ steps.parse.outputs.ucm_ref }}
      python_version: ${{ steps.parse.outputs.python_version }}
      platform: ${{ steps.parse.outputs.platform }}
      upload_to_release: ${{ steps.parse.outputs.upload_to_release }}
      issue_number: ${{ steps.parse.outputs.issue_number }}

    steps:
      - name: Parse configuration
        id: parse
        run: |
          python3 << 'PYEOF'
          import os
          import re

          event_name = os.environ.get('GITHUB_EVENT_NAME', '')

          if event_name == 'workflow_dispatch':
              # workflow_dispatch: 使用 inputs 环境变量
              ucm_ref = os.environ.get('INPUT_UCM_REF', 'main')
              python_version = os.environ.get('INPUT_PYTHON_VERSION', '3.11')
              platform = os.environ.get('INPUT_PLATFORM', 'simu')
              upload_to_release = os.environ.get('INPUT_UPLOAD_TO_RELEASE', 'true')
              issue_number = '0'
          else:
              # Issue 触发: 从 event 文件解析
              import json
              with open(os.environ.get('GITHUB_EVENT_PATH', '/github/workflow/event.json')) as f:
                  event = json.load(f)

              issue_body = event.get('issue', {}).get('body', '')
              issue_number = str(event.get('issue', {}).get('number', '0'))

              # 默认值
              ucm_ref = 'main'
              python_version = '3.11'
              platform = 'simu'
              upload_to_release = 'true'

              # 解析 build_config YAML 块
              config_block_match = re.search(
                  r'build_config:\s*\n(.*?)(?:\n```|\n---|\n\*{3,}|\Z)',
                  issue_body,
                  re.DOTALL
              )

              if config_block_match:
                  config_block = config_block_match.group(1)
                  for line in config_block.split('\n'):
                      line = line.strip()
                      if not line or line.startswith('#'):
                          continue

                      if line.startswith('ucm_ref:'):
                          ucm_ref = line.split(':', 1)[1].strip()
                      elif line.startswith('python_version:'):
                          py_val = line.split(':', 1)[1].strip()
                          py_val = re.sub(r'^["\']|["\']$', '', py_val)
                          python_version = py_val
                      elif line.startswith('platform:'):
                          platform = line.split(':', 1)[1].strip()
                      elif line.startswith('upload_to_release:'):
                          upload_to_release = line.split(':', 1)[1].strip().lower()

              print(f"Parsing Issue #{issue_number}...")
              print(f"  UCM Ref: {ucm_ref}")
              print(f"  Python Version: {python_version}")
              print(f"  Platform: {platform}")
              print(f"  Upload to Release: {upload_to_release}")

          # 写入 GITHUB_OUTPUT
          with open(os.environ.get('GITHUB_OUTPUT', '/dev/null'), 'a') as f:
              f.write(f"ucm_ref={ucm_ref}\n")
              f.write(f"python_version={python_version}\n")
              f.write(f"platform={platform}\n")
              f.write(f"upload_to_release={upload_to_release}\n")
              f.write(f"issue_number={issue_number}\n")
          PYEOF
        env:
          INPUT_UCM_REF: ${{ inputs.ucm_ref }}
          INPUT_PYTHON_VERSION: ${{ inputs.python_version }}
          INPUT_PLATFORM: ${{ inputs.platform }}
          INPUT_UPLOAD_TO_RELEASE: ${{ inputs.upload_to_release }}

  # SIMU 模式构建 - 纯 CPU，无 GPU/NPU 依赖
  build-simu:
    needs: parse-config
    if: needs.parse-config.outputs.platform == 'simu'
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: aarch64

    steps:
      - name: Checkout build_ucm repo
        uses: actions/checkout@v4

      - name: Setup Python ${{ needs.parse-config.outputs.python_version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ needs.parse-config.outputs.python_version }}

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build wheel setuptools cmake ninja

      - name: Clone UCM repository
        run: |
          git clone --depth 1 --branch ${{ needs.parse-config.outputs.ucm_ref }} $UCM_REPO ucm
          cd ucm
          echo "UCM commit: $(git rev-parse HEAD)"

      - name: Build wheel (simu mode)
        run: |
          cd ucm
          export PLATFORM="simu"
          rm -rf build dist *.egg-info
          python -m build --wheel --no-isolation

      - name: List built wheels
        run: |
          cd ucm
          ls -la dist/
          for f in dist/*.whl; do
            echo "  $(basename $f)"
          done

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-simu-${{ matrix.arch }}-py${{ needs.parse-config.outputs.python_version }}
          path: ucm/dist/*.whl
          retention-days: 30

  # SIMU 模式验证
  verify-simu:
    needs: [parse-config, build-simu]
    if: needs.parse-config.outputs.platform == 'simu'
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: aarch64

    steps:
      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: wheel-simu-${{ matrix.arch }}-py${{ needs.parse-config.outputs.python_version }}
          path: wheels

      - name: Setup Python ${{ needs.parse-config.outputs.python_version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ needs.parse-config.outputs.python_version }}

      - name: Install and verify wheel
        run: |
          pip install wheels/*.whl
          python -c "import ucm; print('✅ UCM imported successfully')"
          python -c "import ucm, os; print(f'Location: {ucm.__file__}')"

      - name: Platform info
        run: |
          echo "Platform: $(uname -m)"
          echo "Python: $(python --version)"

  # CUDA 模式构建 - 需要 CUDA Toolkit
  build-cuda:
    needs: parse-config
    if: needs.parse-config.outputs.platform == 'cuda'
    runs-on: ubuntu-latest
    # 使用 NVIDIA CUDA 容器镜像
    container:
      image: nvidia/cuda:12.4-devel-ubuntu22.04

    steps:
      - name: Checkout build_ucm repo
        uses: actions/checkout@v4

      - name: Install Python and build tools
        run: |
          apt-get update
          apt-get install -y python${{ needs.parse-config.outputs.python_version }} python${{ needs.parse-config.outputs.python_version }}-dev python${{ needs.parse-config.outputs.python_version }}-venv
          python${{ needs.parse-config.outputs.python_version }} -m pip install --upgrade pip
          python${{ needs.parse-config.outputs.python_version }} -m pip install build wheel setuptools cmake ninja pybind11

      - name: Clone UCM repository
        run: |
          git clone --depth 1 --branch ${{ needs.parse-config.outputs.ucm_ref }} $UCM_REPO ucm
          cd ucm
          echo "UCM commit: $(git rev-parse HEAD)"

      - name: Build wheel (CUDA mode)
        env:
          PLATFORM: cuda
          CUDA_HOME: /usr/local/cuda
        run: |
          cd ucm
          rm -rf build dist *.egg-info
          python${{ needs.parse-config.outputs.python_version }} -m build --wheel --no-isolation

      - name: List built wheels
        run: |
          cd ucm
          ls -la dist/
          for f in dist/*.whl; do
            echo "  $(basename $f)"
          done

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-cuda-x86_64-py${{ needs.parse-config.outputs.python_version }}
          path: ucm/dist/*.whl
          retention-days: 30

  # CUDA 模式验证 (基础验证，无 GPU)
  verify-cuda:
    needs: [parse-config, build-cuda]
    if: needs.parse-config.outputs.platform == 'cuda'
    runs-on: ubuntu-latest

    steps:
      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: wheel-cuda-x86_64-py${{ needs.parse-config.outputs.python_version }}
          path: wheels

      - name: Setup Python ${{ needs.parse-config.outputs.python_version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ needs.parse-config.outputs.python_version }}

      - name: Basic verification (import check)
        run: |
          pip install wheels/*.whl
          python -c "import ucm; print('✅ UCM imported successfully')"
          echo "Note: CUDA kernels require GPU runtime to execute"

  # Ascend 模式构建 - 需要 CANN Toolkit (ARM64)
  build-ascend:
    needs: parse-config
    if: needs.parse-config.outputs.platform == 'ascend'
    runs-on: ubuntu-24.04-arm
    # 注意：实际构建需要预配置的 Ascend 环境
    # 这里使用基础镜像，实际部署需要使用华为提供的 CANN 镜像

    steps:
      - name: Checkout build_ucm repo
        uses: actions/checkout@v4

      - name: Setup Python ${{ needs.parse-config.outputs.python_version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ needs.parse-config.outputs.python_version }}

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build wheel setuptools cmake ninja

      - name: Clone UCM repository
        run: |
          git clone --depth 1 --branch ${{ needs.parse-config.outputs.ucm_ref }} $UCM_REPO ucm
          cd ucm
          echo "UCM commit: $(git rev-parse HEAD)"

      - name: Check Ascend environment
        run: |
          echo "Checking Ascend CANN environment..."
          # 检查 CANN 是否安装
          if [ -d "/usr/local/Ascend/ascend-toolkit" ]; then
            echo "CANN found at /usr/local/Ascend/ascend-toolkit"
            ls -la /usr/local/Ascend/ascend-toolkit/latest/lib64/
          else
            echo "⚠️ CANN not found - using simu mode fallback"
            echo "Note: Real Ascend build requires CANN toolkit"
          fi

      - name: Build wheel (Ascend mode)
        env:
          PLATFORM: ascend
        run: |
          cd ucm
          # 如果 CANN 存在则使用 ascend，否则 fallback 到 simu
          if [ -d "/usr/local/Ascend/ascend-toolkit" ]; then
            export PLATFORM="ascend"
            export ASCEND_ROOT="/usr/local/Ascend/ascend-toolkit/latest"
          else
            echo "⚠️ Fallback to simu mode"
            export PLATFORM="simu"
          fi
          rm -rf build dist *.egg-info
          python -m build --wheel --no-isolation

      - name: List built wheels
        run: |
          cd ucm
          ls -la dist/
          for f in dist/*.whl; do
            echo "  $(basename $f)"
          done

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-ascend-aarch64-py${{ needs.parse-config.outputs.python_version }}
          path: ucm/dist/*.whl
          retention-days: 30

  # Ascend 模式验证
  verify-ascend:
    needs: [parse-config, build-ascend]
    if: needs.parse-config.outputs.platform == 'ascend'
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: wheel-ascend-aarch64-py${{ needs.parse-config.outputs.python_version }}
          path: wheels

      - name: Setup Python ${{ needs.parse-config.outputs.python_version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ needs.parse-config.outputs.python_version }}

      - name: Basic verification
        run: |
          pip install wheels/*.whl
          python -c "import ucm; print('✅ UCM imported successfully')"
          echo "Note: Ascend kernels require NPU runtime to execute"

  # 创建 Release 并上传 wheel
  create-release:
    needs: [parse-config, build-simu, verify-simu, build-cuda, verify-cuda, build-ascend, verify-ascend]
    runs-on: ubuntu-latest
    if: always() && needs.parse-config.outputs.upload_to_release == 'true' &&
        (needs.build-simu.result == 'success' || needs.build-cuda.result == 'success' || needs.build-ascend.result == 'success')

    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
      release_url: ${{ steps.tag.outputs.release_url }}

    steps:
      - name: Checkout build_ucm repo
        uses: actions/checkout@v4

      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*-py${{ needs.parse-config.outputs.python_version }}
          path: wheels
          merge-multiple: true

      - name: List all wheels
        run: ls -la wheels/

      - name: Generate release tag
        id: tag
        run: |
          UCM_REF="${{ needs.parse-config.outputs.ucm_ref }}"
          PY_VER="${{ needs.parse-config.outputs.python_version }}"
          PLATFORM="${{ needs.parse-config.outputs.platform }}"
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          CLEAN_REF=$(echo "$UCM_REF" | sed 's/[^a-zA-Z0-9._-]/-/g')
          RELEASE_TAG="ucm-${CLEAN_REF}-${PLATFORM}-py${PY_VER}-${TIMESTAMP}"
          echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT
          echo "release_url=https://github.com/${{ github.repository }}/releases/tag/${RELEASE_TAG}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: UCM Wheels - ${{ needs.parse-config.outputs.ucm_ref }} (${{ needs.parse-config.outputs.platform }} / Python ${{ needs.parse-config.outputs.python_version }})
          body: |
            ## UCM Wheel Build

            **UCM Repository:** https://github.com/ModelEngine-Group/unified-cache-management

            **UCM Ref:** ${{ needs.parse-config.outputs.ucm_ref }}

            **Platform:** ${{ needs.parse-config.outputs.platform }}

            **Python Version:** ${{ needs.parse-config.outputs.python_version }}

            **Triggered by:** ${{ github.event_name }}

            ### Platform Notes
            - **simu**: Simulation mode, no GPU/NPU kernels (for testing)
            - **cuda**: CUDA kernels included (requires NVIDIA GPU runtime)
            - **ascend**: Ascend NPU kernels (requires Huawei CANN runtime)

            ### Installation

            ```bash
            pip install uc_manager-*-cp${{ needs.parse-config.outputs.python_version }}*.whl
            ```

            All wheels have passed basic import verification.
          files: wheels/*.whl
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 评论 Issue 报告构建结果
  report-result:
    needs: [parse-config, build-simu, verify-simu, build-cuda, verify-cuda, build-ascend, verify-ascend, create-release]
    runs-on: ubuntu-latest
    if: always() && needs.parse-config.outputs.issue_number != '0' &&
        (needs.build-simu.result == 'success' || needs.build-cuda.result == 'success' || needs.build-ascend.result == 'success')

    steps:
      - name: Comment on Issue
        uses: actions/github-script@v7
        env:
          BUILD_SIMU_RESULT: ${{ needs.build-simu.result }}
          BUILD_CUDA_RESULT: ${{ needs.build-cuda.result }}
          BUILD_ASCEND_RESULT: ${{ needs.build-ascend.result }}
        with:
          script: |
            const issueNumber = parseInt('${{ needs.parse-config.outputs.issue_number }}');
            const ucmRef = '${{ needs.parse-config.outputs.ucm_ref }}';
            const pyVersion = '${{ needs.parse-config.outputs.python_version }}';
            const platform = '${{ needs.parse-config.outputs.platform }}';
            const releaseTag = '${{ needs.create-release.outputs.release_tag }}';
            const releaseUrl = '${{ needs.create-release.outputs.release_url }}';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            // 从环境变量获取构建结果
            const buildSimuResult = process.env.BUILD_SIMU_RESULT;
            const buildCudaResult = process.env.BUILD_CUDA_RESULT;
            const buildAscendResult = process.env.BUILD_ASCEND_RESULT;

            let body = `## ✅ UCM Wheel Build Completed\n\n`;
            body += `| Parameter | Value |\n`;
            body += `|-----------|-------|\n`;
            body += `| UCM Ref | ${ucmRef} |\n`;
            body += `| Python Version | ${pyVersion} |\n`;
            body += `| Platform | ${platform} |\n\n`;

            // 添加平台特定的构建结果
            if (platform === 'simu') {
              body += `| x86_64 (simu) | ${buildSimuResult === 'success' ? '✅' : '❌'} |\n`;
              body += `| ARM64 (simu) | ${buildSimuResult === 'success' ? '✅' : '❌'} |\n`;
            } else if (platform === 'cuda') {
              body += `| x86_64 (CUDA) | ${buildCudaResult === 'success' ? '✅' : '❌'} |\n`;
            } else if (platform === 'ascend') {
              body += `| ARM64 (Ascend) | ${buildAscendResult === 'success' ? '✅' : '❌'} |\n`;
            }
            body += `\n`;

            if (releaseTag && releaseUrl) {
              body += `### 📦 Download Wheels\n\n`;
              body += `**Release:** [${releaseTag}](${releaseUrl})\n\n`;
            } else {
              body += `### 📦 Download Wheels\n\n`;
              body += `**Artifacts:** [Download from Workflow Run](${runUrl})\n\n`;
              body += `Wheels are stored in Artifacts (保留30天)\n`;
            }

            // 平台注意事项
            body += `\n### ℹ️ Platform Notes\n\n`;
            if (platform === 'simu') {
              body += `- **simu mode**: Pure CPU, no GPU/NPU kernels\n`;
              body += `- Suitable for testing and development\n`;
            } else if (platform === 'cuda') {
              body += `- **cuda mode**: CUDA kernels included\n`;
              body += `- Requires NVIDIA GPU with CUDA 12.x runtime\n`;
            } else if (platform === 'ascend') {
              body += `- **ascend mode**: Ascend NPU kernels\n`;
              body += `- Requires Huawei CANN toolkit and NPU hardware\n`;
            }

            body += `\n### 🔗 Links\n\n`;
            body += `- [Workflow Run](${runUrl})\n`;
            body += `- [UCM Repository](https://github.com/ModelEngine-Group/unified-cache-management)\n`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: body
            });

      - name: Close Issue
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = parseInt('${{ needs.parse-config.outputs.issue_number }}');
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              state: 'closed'
            });